<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Mikaelin Salakellari - Pure 3D VR Edition</title>
  <!-- Ladataan uusin A-Frame ja virallinen Teleport-liikkumiskirjasto VR-laseille -->
  <script src="https://aframe.io"></script>
  <script src="https://jsdelivr.net"></script>
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #000;">

  <!-- PUHDAS VR-MAAILMA ILMAN PC-RAJOITTEITA -->
  <a-scene vr-mode-ui="enabled: true" renderer="colorManagement: true; antialias: true;">
    
    <a-assets>
      <!-- Korkealaatuiset valokuvatekstuurit -->
      <img id="kiviseina" src="https://unsplash.com">
      <img id="lankkulattia" src="https://unsplash.com">
      <img id="tammipuu" src="https://unsplash.com">
      <img id="metallipinta" src="https://unsplash.com">

      <!-- SPATIAL AUDIO: Aidot tila-äänikomponentit suoraan 3D-koordinaatteihin -->
      <audio id="sound-fireplace" src="https://mixkit.co" loop="true"></audio>
      <audio id="sound-creak" src="https://mixkit.co"></audio>
      <audio id="sound-click" src="https://mixkit.co"></audio>
      <audio id="sound-success" src="https://mixkit.co"></audio>
      <audio id="sound-error" src="https://mixkit.co"></audio>
    </a-assets>

    <!-- REALISTINEN YMPÄRISTÖVALAISTUS -->
    
    

    <!-- LATTIA JA KIVISEINÄT VALOKUVATEKSTUUREILLA -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="14" height="14" src="#lankkulattia" repeat="4 4"></a-plane>
    <a-box position="0 2 -7" width="14" height="4" depth="0.2" src="#kiviseina" repeat="3 1">
      <a-text value="MIKAELIN SYNTYMAVUOSI: 1954" color="#fbbf24" position="0 0.8 0.15" width="5" align="center" font="mozillavr"></a-text>
    </a-box>
    <a-box position="0 2 7" width="14" height="4" depth="0.2" src="#kiviseina" repeat="3 1"></a-box>
    <a-box position="7 2 0" rotation="0 -90 0" width="14" height="4" depth="0.2" src="#kiviseina" repeat="3 1"></a-box>
    <a-box position="-7 2 0" rotation="0 90 0" width="14" height="4" depth="0.2" src="#kiviseina" repeat="3 1"></a-box>

    <!-- REALISTINEN TAKKA: Ääni kuuluu aidosti takan suunnasta (Spatial Sound) -->
    <a-box position="-6.8 1.1 -2" rotation="0 90 0" width="3" height="2.2" depth="0.4" color="#334155"
              sound="src: #sound-fireplace; autoplay: true; loop: true; positional: true; volume: 2; distanceModel: exponential">
      <a-box position="0 -0.2 0.22" width="1.6" height="1.2" depth="0.1" color="#0f172a"></a-box>
      <a-box position="0 -0.5 0.26" width="1.2" height="0.25" depth="0.15" color="#f97316" material="emissive: #f43f5e; emissiveIntensity: 4"></a-box>
    </a-box>
    
    <!-- RUSTIIKKINEN TAMMIPÖYTÄ JA LUKITTU KIRSTU -->
    <a-box id="mikael-table" position="0 0.4 -3" width="2.2" height="0.8" depth="1.4" src="#tammipuu">
      <a-box id="mikael-chest" class="clickable" position="0 0.55 0.1" width="0.8" height="0.4" depth="0.5" src="#tammipuu" color="#7f1d1d"
             sound="src: #sound-creak; positional: true; volume: 2">
        <a-box id="chest-padlock" position="0 -0.05 0.26" width="0.08" height="0.1" depth="0.03" color="#d97706"></a-box>
        <a-text value="KOSKETA AVAIMELLA" position="0 0.25 0" align="center" width="1.8" color="#ffffff" font="mozillavr"></a-text>
        <a-plane id="chest-interior-hint" position="0 0.18 0.05" rotation="-20 0 0" width="0.7" height="0.25" color="#fafaf9" visible="false">
          <a-text value="KASSAKAAPIN KOODI: 1954" color="#1e293b" position="0 0 0.01" width="1.6" align="center" font="mozillavr"></a-text>
        </a-plane>
      </a-box>
    </a-box>

    <!-- METALLINEN POISTUMISOVI ETELÄSEINÄLLÄ -->
    <a-box id="escape-door" class="clickable" position="0 1.5 6.8" width="2.2" height="3" depth="0.12" src="#metallipinta" color="#1e1b4b"
           sound="src: #sound-success; positional: true; volume: 2">
      <a-text id="door-text" value="SAHKOMAGNEETTI LUKITTU" position="0 0.5 0.06" align="center" width="2.4" color="#f43f5e" font="mozillavr"></a-text>
    </a-box>
    <a-sphere position="0.8 1.4 6.65" radius="0.06" color="#d97706"></a-sphere>

    <!-- KYLMÄTERÄKSINEN KASSAKAAPPI SEINÄLLÄ -->
    <a-box id="mikael-safe-body" position="3 1.5 -6.8" width="1.4" height="1.4" depth="0.3" src="#metallipinta"
           sound="src: #sound-error; positional: true; volume: 2">
      <a-box position="-0.25 0.35 0.16" width="0.48" height="0.22" depth="0.01" color="#020617">
        <a-text id="safe-screen" value="CODE?" position="0 0 0.01" color="#f43f5e" width="2.4" align="center" font="monoid"></a-text>
      </a-box>
      <a-box id="mikael-safe-door" position="0.25 0 0.17" width="0.55" height="0.85" depth="0.02" color="#0f172a">
        <a-cylinder position="0 0 0.03" rotation="90 0 0" radius="0.1" height="0.04" color="#94a3b8"></a-cylinder>
      </a-box>
    </a-box>
    <!-- SUURET 3D-NUMERONÄPPÄIMET HELPOSTI KOSKETETTAVAKSI VR-KÄSILLÄ -->
    <a-box id="btn-3d-1" class="clickable" position="1.9 1.6 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="1" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-2" class="clickable" position="2.05 1.6 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="2" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-3" class="clickable" position="2.2 1.6 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="3" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-4" class="clickable" position="1.9 1.45 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="4" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-5" class="clickable" position="2.05 1.45 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="5" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-6" class="clickable" position="2.2 1.45 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="6" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-7" class="clickable" position="1.9 1.3 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="7" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-8" class="clickable" position="2.05 1.3 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="8" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-9" class="clickable" position="2.2 1.3 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="9" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-C" class="clickable" position="1.9 1.15 -6.5" width="0.1" height="0.1" depth="0.08" color="#ef4444" sound="src: #sound-click; positional: true"><a-text value="C" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-0" class="clickable" position="2.05 1.15 -6.5" width="0.1" height="0.1" depth="0.08" color="#334155" sound="src: #sound-click; positional: true"><a-text value="0" align="center" position="0 0 0.05" scale="0.3 0.3 0.3" font="mozillavr"></a-text></a-box>
    <a-box id="btn-3d-E" class="clickable" position="2.2 1.15 -6.5" width="0.1" height="0.1" depth="0.08" color="#10b981" sound="src: #sound-click; positional: true"><a-text value="OK" align="center" position="0 0 0.05" scale="0.22 0.22 0.22" font="mozillavr"></a-text></a-box>

    <!-- KULTAINEN AVAIN LATTIALLA HEHKUVALLA HALOLLA -->
    
      <a-cylinder color="#fbbf24" radius="0.02" height="0.25"></a-cylinder>
      <a-sphere position="0 0.14 0" radius="0.05" color="#fbbf24"></a-sphere>
      <a-sphere position="0 0 0" radius="0.22" color="#fbbf24" material="opacity: 0.18; transparent: true; shader: flat"></a-sphere>
    
    <!-- NYKYAIKAINEN VR-LIIKKUMINEN (TELEPORTTAUS & TATEILLA KÄÄNTYMINEN) -->
    
      <a-camera look-controls="enabled: true" wasd-controls="enabled: false"></a-camera>
      <!-- Vasen käsi: Ohjaimen tatti tähdentää ja teleporttaa maahan -->
      
      <!-- Oikea käsi: Fyysiset sormet tarttuvat ja osoittavat elementtejä suoraan liipaisimesta -->
      
    
  </a-scene>

  <!-- REAALIAIKAISET TEKSTIOVERLAYT VR-LASIEN ULKOPUOLELLE -->
  <div id="hud-banner" style="position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 600px; background: rgba(15,23,42,0.9); border: 1px solid #f43f5e; border-radius: 12px; padding: 16px 22px; z-index: 50; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(12px);">
    <div class="hud-indicator" style="width: 10px; height: 10px; background-color: #f43f5e; border-radius: 50%; box-shadow: 0 0 12px #f43f5e;"></div>
    <div class="hud-text" id="hud-message" style="font-size: 13.5px; font-weight: bold; color: #f1f5f9;">🥽 Laita VR-lasit päähän ja klikkaa alta 'ENTER VR' käynnistääksesi aidon Next-Gen kellariseikkailun!</div>
  </div>

  <div id="win-overlay" style="position: fixed; inset: 0; background: rgba(2,6,23,0.98); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 24px;">
    <div style="background: #0b0f19; border: 1px solid #10b981; border-radius: 20px; max-width: 500px; width: 100%; padding: 32px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.9);">
      <div style="font-size: 40px; margin-bottom: 12px;">🏆🔓</div>
      <h2 style="color: #ffffff; font-size: 24px; font-weight: 800; margin-bottom: 12px;">Arvoitus Ratkaistu!</h2>
      <p style="color: #94a3b8; font-size: 13.5px; line-height: 1.6; margin-bottom: 24px;">Mursit sähkölukon koodilla 1954 ja löysit perintöpaperit! Sähkömagneettinen ovi on nyt avattu ja olet vapaa.</p>
      <button style="width: 100%; padding: 14px; background: linear-gradient(90deg, #10b981 0%, #059669 100%); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;" onclick="window.location.href = '/'">PALAA PÄÄVALIKKOON</button>
    </div>
  </div>
  <!-- JAVASCRIPT-PELIMOOTTORI PURE VR-STANDARDILLE -->
  <script>
    let state = { hasKey: false, isChestOpen: false, isSafeSolved: false, enteredCode: "" };

    function updateHudMessage(text) { document.getElementById('hud-message').innerText = text; }

    function grabKey() {
      if (state.hasKey) return;
      state.hasKey = true;
      const keyAudio = document.getElementById('mikael-key');
      if (keyAudio && keyAudio.components.sound) keyAudio.components.sound.playSound();
      keyAudio.setAttribute('visible', 'false');
      updateHudMessage("🎒 Sait kultaisen avaimen! Kosketa sillä työpöydän päällä olevan punaisen rauta-arkun lukkoa.");
    }

    function triggerOpenChest() {
      if (state.isChestOpen) return;
      if (state.hasKey) {
        state.isChestOpen = true;
        const chestObj = document.getElementById('mikael-chest');
        if (chestObj && chestObj.components.sound) chestObj.components.sound.playSound();
        document.getElementById('chest-interior-hint').setAttribute('visible', 'true');
        chestObj.setAttribute('color', '#14532d');
        updateHudMessage("🔓 Arkku aukesi! Sisällä lukee: 'KASSAKAAPIN KOODI ON 1954'. Mene kassakaapille ja näppäile koodi seinän 3D-painikkeista.");
      } else {
        const safeBody = document.getElementById('mikael-safe-body');
        if (safeBody && safeBody.components.sound) safeBody.components.sound.playSound();
        updateHudMessage("🔒 Rauta-arkku on lukossa! Tarvitset avaimen. Etsi lattialta hehkuva kultainen avain.");
      }
    }

    function pressKey(val) {
      if (state.isSafeSolved) return;
      const btnObj = document.getElementById(`btn-3d-${val}`);
      if (btnObj && btnObj.components.sound) btnObj.components.sound.playSound();
      const safeText3d = document.getElementById('safe-screen');
      
      if (val === 'C') {
        state.enteredCode = ""; if (safeText3d) safeText3d.setAttribute('value', 'CODE?');
      } else if (val === 'E') {
        if (state.enteredCode === "1954") {
          state.isSafeSolved = true;
          if (safeText3d) { safeText3d.setAttribute('value', 'OPEN'); safeText3d.setAttribute('color', '#10b981'); }
          document.getElementById('mikael-safe-door').setAttribute('rotation', '0 90 0');
          document.getElementById('mikael-safe-door').setAttribute('position', '0.5 0 0.2');
          const escapeDoor = document.getElementById('escape-door');
          escapeDoor.setAttribute('color', '#10b981');
          document.getElementById('door-text').setAttribute('value', 'AVATTU - KOSKETA OVEA');
          document.getElementById('door-text').setAttribute('color', '#ffffff');
          updateHudMessage("🏆 Kassakaappi auki! Sähkömagneettinen ovi eteläseinällä on nyt vapautettu. Kosketa ovea paetaksesi!");
        } else {
          const safeBody = document.getElementById('mikael-safe-body');
          if (safeBody && safeBody.components.sound) safeBody.components.sound.playSound();
          state.enteredCode = "";
          if (safeText3d) safeText3d.setAttribute('value', 'ERROR');
        }
      } else {
        if (state.enteredCode.length < 4) {
          state.enteredCode += val; if (safeText3d) safeText3d.setAttribute('value', state.enteredCode);
        }
      }
    }

    function triggerEscape() {
      if (state.isSafeSolved) {
        const escapeDoor = document.getElementById('escape-door');
        if (escapeDoor && escapeDoor.components.sound) escapeDoor.components.sound.playSound();
        document.getElementById('win-overlay').style.display = 'flex';
      } else {
        const safeBody = document.getElementById('mikael-safe-body');
        if (safeBody && safeBody.components.sound) safeBody.components.sound.playSound();
        updateHudMessage("⚠️ Sähköovi vaatii magneettivirran sammuttamisen! Ratkaise ensin kassakaapin koodi.");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('mikael-key').addEventListener('click', grabKey);
      document.getElementById('mikael-chest').addEventListener('click', triggerOpenChest);
      document.addEventListener('click', function(e) {
         // Herätetään äänimoottori dynaamisesti ensimmäisellä klikkauksella
         const scene = document.querySelector('a-scene');
         if (scene && scene.audioListener && scene.audioListener.context.state === 'suspended') {
           scene.audioListener.context.resume();
         }
      });
      document.getElementById('escape-door').addEventListener('click', triggerEscape);

      for (let i = 0; i <= 9; i++) {
        const btn = document.getElementById(`btn-3d-${i}`);
        if (btn) btn.addEventListener('click', () => pressKey(i.toString()));
      }
      const btnC = document.getElementById('btn-3d-C'); if (btnC) btnC.addEventListener('click', () => pressKey('C'));
      const btnE = document.getElementById('btn-3d-E'); if (btnE) btnE.addEventListener('click', () => pressKey('E'));
    });
  </script>
</body>
</html>
