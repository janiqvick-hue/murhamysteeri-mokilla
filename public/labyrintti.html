<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Mikaelin Perintö: Lopen Salaisuudet - Real VR</title>
  <!-- Ladataan uusin vakaa A-Frame 3D-VR-moottori sekä teleport-ohjain -->
  <script src="https://aframe.io"></script>
  <script src="https://jsdelivr.net"></script>
  <style>
    body, html { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; background-color: #000; font-family: sans-serif; }
    
    /* Läpinäkyvä HUD-banneri viesteille VR-lasien ulkopuolella testatessa */
    #hud-banner {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      width: 85%; max-width: 650px; background: rgba(9, 15, 32, 0.94);
      border: 1px solid rgba(99, 102, 241, 0.4); box-shadow: 0 20px 50px rgba(0,0,0,0.9);
      border-radius: 14px; padding: 16px 22px; z-index: 50; display: flex; align-items: center; gap: 12px;
      pointer-events: none; backdrop-filter: blur(12px);
    }
    .hud-indicator { width: 10px; height: 10px; background-color: #6366f1; border-radius: 50%; box-shadow: 0 0 12px #6366f1; }
    .hud-text { font-size: 13.5px; font-weight: bold; color: #f1f5f9; line-height: 1.4; }
  </style>
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">

  <!-- PUHDAS VR-SCENE ILMAN SIVUPALKKEJA TAI EMOSOVELLUKSEN BLOCKAUSTA -->
  <a-scene vr-mode-ui="enabled: true" renderer="colorManagement: true; antialias: true;">
    
    <a-assets>
      <!-- REAGOIVAT LINKIT LÄHETTÄMIISI AITOIHIN LOPEN VALOKUVIIN -->
      <!-- Sektori 1: Lopen kirkonkylän aito ilmakuva 360-taustaksi -->
      <img id="loppi-ilmakuva" src="https://unsplash.com">
      <!-- Sektori 1: Lopen kauppatien katunäkymä etuseinäksi -->
      <img id="loppi-raitti" src="https://unsplash.com">
      <!-- Sektori 2: Santa Pirjon vanhan puukirkon aito hirsisisus arkistoksi -->
      <img id="loppi-vanhakirkko" src="https://unsplash.com">
      <!-- Sektori 3: Lopen uuden kirkon sisätilat alttareineen ja pilareineen -->
      <img id="loppi-kirkkosali" src="https://unsplash.com">
      
      <!-- Esineiden yleiset tekstuurit (Veturin teräs ja urkujen puu) -->
      <img id="veturimetalli" src="https://unsplash.com">
      <img id="urkupuu" src="https://unsplash.com">

      <!-- REALISTISET TILA-ÄÄNET SPATIAL AUDIOLLA -->
      <audio id="sfx-bells" src="https://mixkit.co"></audio>
      <audio id="sfx-steam" src="https://mixkit.co" loop="true"></audio>
      <audio id="sfx-click" src="https://mixkit.co"></audio>
      <audio id="sfx-organ" src="https://mixkit.co"></audio>
    </a-assets>

    <!-- REALISTINEN YMPÄRISTÖVALAISTUS -->
    
    
    <!-- SEKTORI 1: LOPEN KYLÄNRAITTI & KAUPPATIE [AITOMAAILMA] -->
    
      <!-- 360-tausta Lopen kauniista maisemasta -->
      <a-sky src="#loppi-ilmakuva" rotation="0 -90 0"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="22" height="22" src="#loppi-raitti" repeat="1 1"></a-plane>

      <!-- 3D HISTORIALLINEN PIKKUPÄSSI-HÖYRYVETURI [MALLINNETTU AIDON KUVAN MUKAAN] -->
      
        <!-- Musta sylinterimäinen veturirunko -->
        <a-cylinder src="#veturimetalli" color="#1a1a1a" position="0 0.9 0" rotation="0 0 90" radius="0.55" height="2.6"></a-cylinder>
        <!-- Vihreä takahytti / ohjaamo kuvasi mukaan -->
        <a-box src="#veturimetalli" color="#1e3a34" position="-1.1 1.4 0" width="1.1" height="1.5" depth="1.3"></a-box>
        <!-- Punainen etu- ja alusrunko kuvasi mukaan -->
        <a-box color="#991b1b" position="0.4 0.3 0" width="2.4" height="0.15" depth="1.15"></a-box>
        <!-- Suuri musta suppilomainen piippu edessä -->
        <a-cone src="#veturimetalli" color="#1a1a1a" position="0.9 1.8 0" radiusBottom="0.25" radiusTop="0.1" height="0.7"></a-cone>
        <!-- Etulamppu ja suuret harmaat pyörät -->
        <a-cylinder color="#94a3b8" position="1.1 0.7 0" rotation="0 0 90" radius="0.15" height="0.1"></a-cylinder>
        <a-cylinder color="#334155" position="-0.4 0.4 0.58" rotation="90 0 0" radius="0.4" height="0.08"></a-cylinder>
        <a-cylinder color="#334155" position="0.4 0.4 0.58" rotation="90 0 0" radius="0.4" height="0.08"></a-cylinder>

        <!-- MEKAANISET 3D-MUKAVUUSNÄPPÄIMET PÄSSIRADAN AVAAJAAN [VUOSI 1907] -->
        
          <a-box id="btn-p-1" class="clickable" position="-0.15 0.2 0" width="0.08" height="0.08" depth="0.04" color="#334155"><a-text value="1" align="center" position="0 0 0.02" scale="0.2 0.2 0.2" font="mozillavr"></a-text></a-box>
          <a-box id="btn-p-9" class="clickable" position="0 0.2 0" width="0.08" height="0.08" depth="0.04" color="#334155"><a-text value="9" align="center" position="0 0 0.02" scale="0.2 0.2 0.2" font="mozillavr"></a-text></a-box>
          <a-box id="btn-p-0" class="clickable" position="0.15 0.2 0" width="0.08" height="0.08" depth="0.04" color="#334155"><a-text value="0" align="center" position="0 0 0.02" scale="0.2 0.2 0.2" font="mozillavr"></a-text></a-box>
          <a-box id="btn-p-7" class="clickable" position="-0.15 0.08 0" width="0.08" height="0.08" depth="0.04" color="#334155"><a-text value="7" align="center" position="0 0 0.02" scale="0.2 0.2 0.2" font="mozillavr"></a-text></a-box>
          <a-box id="btn-p-C" class="clickable" position="0 0.08 0" width="0.08" height="0.08" depth="0.04" color="#ef4444"><a-text value="C" align="center" position="0 0 0.02" scale="0.2 0.2 0.2" font="mozillavr"></a-text></a-box>
          <a-box id="btn-p-E" class="clickable" position="0.15 0.08 0" width="0.08" height="0.08" depth="0.04" color="#10b981"><a-text value="OK" align="center" position="0 0 0.02" scale="0.15 0.15 0.15" font="mozillavr"></a-text></a-box>
          <a-box position="0 0.32 0" width="0.38" height="0.1" depth="0.02" color="#010409">
            <a-text id="passi-screen" value="VUOSI?" color="#ef4444" align="center" position="0 0 0.01" width="1.4" font="monoid"></a-text>
          </a-box>
        

        <!-- LOPEN PERUNAKORI VIHJEELLÄ -->
        <a-box id="perunalaatikko" class="clickable" position="1.1 0.1 0.75" width="0.5" height="0.35" depth="0.5" src="#loppi-vanhakirkko">
          <a-text value="LAATIKKO: PERUNAA" position="0 0.2 0.26" align="center" width="1" color="#fff" font="mozillavr"></a-text>
          <a-text value="KAPEARAIDE - 1907" position="0 -0.05 0.26" align="center" width="0.8" color="#fbbf24" font="mozillavr"></a-text>
        </a-box>

        <!-- LUKITTU SALALOKERO VETURISSA (Sisältää urkuavaimen) -->
        <a-box id="hatch-obj" position="-1.1 0.5 0.66" width="0.35" height="0.35" depth="0.02" color="#111827">
          <a-text value="URKUAVAIN" align="center" position="0 0.2 0" width="0.9" color="#fff" font="mozillavr"></a-text>
          
            <a-cylinder color="#fbbf24" radius="0.015" height="0.18"></a-cylinder>
            <a-sphere position="0 0.09 0" radius="0.04" color="#fbbf24"></a-sphere>
          
        </a-box>
      

      <!-- METALLIPORTTI KIRJASTOON -->
      <a-box id="lopen-gate" class="clickable" position="0 1.5 -9" width="2.4" height="3" depth="0.1" src="#veturimetalli" color="#111827">
        <a-text id="lopen-gate-text" value="ARKISTOREITTI LUKITTU" position="0 0.5 0.06" align="center" width="2.2" color="#f43f5e" font="mozillavr"></a-text>
      </a-box>
    

    <!-- SEKTORI 2: SANTA PIRJON VANHA HIRSIAULA [ARKISTO] -->
    
      <a-sky color="#030306"></a-sky>
      <!-- Seinät ja katto aidoilla Santa Pirjon vanhan puukirkon hirsillä -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="15" height="15" src="#loppi-vanhakirkko" repeat="1 1"></a-plane>
      <a-box position="0 2 -6.5" width="15" height="4" depth="0.2" src="#loppi-vanhakirkko" repeat="1 1"></a-box>
      <a-box position="6.5 2 0" rotation="0 -90 0" width="15" height="4" depth="0.2" src="#loppi-vanhakirkko" repeat="1 1"></a-box>
      <a-box position="-6.5 2 0" rotation="0 90 0" width="15" height="4" depth="0.2" src="#loppi-vanhakirkko" repeat="1 1"></a-box>

      <a-plane position="0 2.2 -6.3" width="2.6" height="1.4" color="#030712">
        <a-text value="SUKUMUISTIO 1951" color="#fbbf24" position="0 0.45 0.01" width="3.4" align="center" font="mozillavr"></a-text>
        <a-text value="Mikael kätki perintöpaperit uuden kirkon\nurkuholvien taakse salalokeroon.\n\nURKUJEN SOITTOJÄRJESTYS:\nSeuraa Koskelan vuosia: D - A - F - G" color="#fff" position="0 -0.15 0.01" width="2" align="center" font="mozillavr"></a-text>
      </a-plane>

      <!-- HOHTAVA PORTAALI UUTEEN TIILIKIRKKOON -->
      <a-box id="church-portal-obj" class="clickable" position="0 1.2 6" width="1.8" height="2.5" depth="0.1" color="#4f46e5" material="opacity: 0.75; transparent: true">
        <a-text value="ASTU TIILIKIRKKOON" position="0 0 0.06" align="center" width="2.1" color="#fff" font="mozillavr"></a-text>
      </a-box>
    

    <!-- SEKTORI 3: LOPEN UUSI MAJESTEETTINEN TIILIKIRKKO [FINAALI] -->
    
      <a-sky color="#010103"></a-sky>
      <!-- Kirkkosalin lattia ja upeat aidot punatiiliseinät kuvasarjastasi -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="18" height="18" src="#loppi-lankkulattia" repeat="3 3"></a-plane>
      <a-box position="0 3.5 -8.5" width="18" height="7" depth="0.2" src="#loppi-kirkkosali" repeat="1 1"></a-box>
      <a-box position="8.5 3.5 0" rotation="0 -90 0" width="18" height="7" depth="0.2" src="#kirkkotiili" repeat="3 1.5"></a-box>
      <a-box position="-8.5 3.5 0" rotation="0 90 0" width="18" height="7" depth="0.2" src="#kirkkotiili" repeat="3 1.5"></a-box>

      <!-- SUURET TIILIKIRKON URUT PILLINEEN -->
      
        <a-box src="#urkupuu" position="0 2 0" width="3.6" height="4" depth="1.3"></a-box>
        <a-cylinder color="#cbd5e1" position="-1.1 2.6 0.66" radius="0.05" height="1.8"></a-cylinder>
        <a-cylinder color="#94a3b8" position="-0.5 2.8 0.66" radius="0.05" height="2.2"></a-cylinder>
        <a-cylinder color="#e2e8f0" position="0 3.1 0.66" radius="0.06" height="2.6"></a-cylinder>
        <a-cylinder color="#94a3b8" position="0.5 2.8 0.66" radius="0.05" height="2.2"></a-cylinder>
        <a-cylinder color="#cbd5e1" position="1.1 2.6 0.66" radius="0.05" height="1.8"></a-cylinder>

        <!-- KOSKETETTAVAT VALKOISET URKUKOSKETTIMET (D-A-F-G) -->
        
          <a-box id="lopen-D" class="clickable" position="-0.45 0 0" width="0.2" height="0.08" depth="0.35" color="#ffffff"><a-text value="D" align="center" position="0 0.05 0.05" rotation="-90 0 0" width="1.6" color="#000" font="mozillavr"></a-text></a-box>
          <a-box id="lopen-A" class="clickable" position="-0.15 0 0" width="0.2" height="0.08" depth="0.35" color="#ffffff"><a-text value="A" align="center" position="0 0.05 0.05" rotation="-90 0 0" width="1.6" color="#000" font="mozillavr"></a-text></a-box>
          <a-box id="lopen-F" class="clickable" position="0.15 0 0" width="0.2" height="0.08" depth="0.35" color="#ffffff"><a-text value="F" align="center" position="0 0.05 0.05" rotation="-90 0 0" width="1.6" color="#000" font="mozillavr"></a-text></a-box>
          <a-box id="lopen-G" class="clickable" position="0.45 0 0" width="0.2" height="0.08" depth="0.35" color="#ffffff"><a-text value="G" align="center" position="0 0.05 0.05" rotation="-90 0 0" width="1.6" color="#000" font="mozillavr"></a-text></a-box>
        
      

      <!-- SALALOKERO SEINÄLLÄ LAHJUSTODISTEILLE -->
      <a-box id="lopen-secret-vault" position="3 1.5 -8.3" width="0.8" height="0.8" depth="0.2" src="#veturimetalli" color="#111827">
        <a-text value="TESTAMENTTI" align="center" position="0 0.5 0.12" width="1.4" color="#fbbf24" font="mozillavr"></a-text>
        <a-cylinder id="lopen-scroll" class="clickable" position="0 -0.08 0.16" radius="0.04" height="0.25" color="#fafaf9" rotation="0 0 45" visible="false">
          <a-text value="POIMI ASIAPAPERIT" align="center" position="0 0.16 0" width="1" color="#10b981" font="mozillavr"></a-text>
        </a-cylinder>
      </a-box>

      <!-- VIIMEINEN RASKAS PUUOVI VOITTOON -->
  <!-- JAVASCRIPT-PELIMOOTTORI LOPEN SALAISUUKSIEN RATKAISEMISEKSI -->
  <script>
    let state = {
      currentSector: 1,
      enteredLocoCode: "",
      hasOrganKey: false,
      playedNotes: [],
      correctNotes: ["D", "A", "F", "G"],
      isVaultOpen: false,
      hasEvidence: false
    };

    function updateHudMessage(text) {
      document.getElementById('hud-message').innerText = text;
    }

    function playSpatialSound(entityId) {
      const entity = document.getElementById(entityId);
      if (entity && entity.components.sound) {
        entity.components.sound.playSound();
      }
    }

    // --- SEKTORI 1: PIKKUPÄSSI-VETURIN KOODIMOOTTORI ---
    function pressLocoKey(val) {
      if (state.hasOrganKey) return;
      playSpatialSound('church-organ-obj'); 
      const screen = document.getElementById('passi-screen');

      if (val === 'C') {
        state.enteredLocoCode = "";
        if (screen) screen.setAttribute('value', 'VUOSI?');
      } else if (val === 'E') {
        if (state.enteredLocoCode === "1907") {
          state.hasOrganKey = true;
          if (screen) {
            screen.setAttribute('value', 'OPEN');
            screen.setAttribute('color', '#10b981');
          }
          playSpatialSound('lopen-exit');
          document.getElementById('organ-key-mesh').setAttribute('visible', 'true');
          document.getElementById('hatch-obj').setAttribute('position', '-1.1 0.5 0.95');
          updateHudMessage("🔓 Pikkupässin murtokoodi 1907 hyväksytty! Salaluukku aukesi. Klikkaa sen sisällä olevaa kultaista Urkuavainta poimiaksesi sen.");
        } else {
          playSpatialSound('pikkupassi-train'); 
          state.enteredLocoCode = "";
          if (screen) screen.setAttribute('value', 'ERROR');
        }
      } else {
        if (state.enteredLocoCode.length < 4) {
          state.enteredLocoCode += val;
          if (screen) screen.setAttribute('value', state.enteredLocoCode);
        }
      }
    }
    function grabOrganKey() {
      if (!state.hasOrganKey || document.getElementById('organ-key-mesh').getAttribute('visible') === 'false') return;
      playSpatialSound('pikkupassi-train'); 
      document.getElementById('organ-key-mesh').setAttribute('visible', 'false');
      document.getElementById('lopen-gate-text').setAttribute('value', 'ARKISTOREITTI VAPAA - KOSKETA PORTTIA');
      document.getElementById('lopen-gate-text').setAttribute('color', '#10b981');
      document.getElementById('lopen-gate').setAttribute('color', '#10b981');
      updateHudMessage("🎒 Sait Lopen vanhan urkuavaimen reppuusi! Reitti kunnankirjaston arkistoon on nyt vapautettu. Kosketa isoa rautaporttia edessäsi.");
    }

    function triggerGateTransition() {
      if (state.hasOrganKey) {
        document.getElementById('sector1').setAttribute('visible', 'false');
        document.getElementById('sector2').setAttribute('visible', 'true');
        state.currentSector = 2;
        document.getElementById('rig').setAttribute('position', '0 0 -18');
        playSpatialSound('pikkupassi-train'); 
        updateHudMessage("📚 Saavuit Lopen Kunnankirjaston vanhaan arkistohuoneeseen (Santa Pirjo -teema). Tutki seinällä olevaa opastaulua löytääksesi finaalin urkuvihjeen, ja astu sen jälkeen sinisestä portaalista kirkkoon!");
      } else {
        playSpatialSound('pikkupassi-train');
        updateHudMessage("🔒 Portti on tiukasti sähkölukossa! Pura ensin Pikkupässi-höyryveturin mekaaninen koodilukko perunalaatikon vihjeen avulla (Kapearaiteen avaamisvuosi).");
      }
    }

    function triggerChurchPortal() {
      document.getElementById('sector2').setAttribute('visible', 'false');
      document.getElementById('sector3').setAttribute('visible', 'true');
      state.currentSector = 3;
      document.getElementById('rig').setAttribute('position', '0 0 -40');
      playSpatialSound('lopen-exit');
      updateHudMessage("⛪ Olet Lopen majesteettisen punatiilikirkon sisällä! Mene urkujen luo ja paina suuria 3D-koskettimia (D-A-F-G) oikeassa järjestyksessä avataksesi sakastin salalokeron.");
    }
    // --- SEKTORI 3: KIRKKOURKUJEN NUOTTIPÄHKINÄ ---
    function pressOrganKey(note) {
      if (state.isVaultOpen) return;
      playSpatialSound('church-organ-obj'); 
      
      const keyObj = document.getElementById(`lopen-${note}`);
      if (keyObj) {
        keyObj.setAttribute('position', `${keyObj.getAttribute('position').x} -0.04 ${keyObj.getAttribute('position').z}`);
        setTimeout(() => {
          keyObj.setAttribute('position', `${keyObj.getAttribute('position').x} 0 ${keyObj.getAttribute('position').z}`);
        }, 250);
      }

      state.playedNotes.push(note);
      
      let currentCheck = state.correctNotes.slice(0, state.playedNotes.length);
      let isCorrectSoFar = state.playedNotes.every((val, i) => val === currentCheck[i]);

      if (!isCorrectSoFar) {
        playSpatialSound('mikael-safe-body'); 
        state.playedNotes = [];
        updateHudMessage("⚠️ Väärä sävelsarja kaikahti kuorissa! Urkujen mekanismi nollautui. Aloita alusta: D - A - F - G.");
        return;
      }

      if (state.playedNotes.length === 4) {
        state.isVaultOpen = true;
        playSpatialSound('lopen-exit'); 
        document.getElementById('lopen-scroll').setAttribute('visible', 'true');
        document.getElementById('lopen-secret-vault').setAttribute('color', '#10b981');
        updateHudMessage("🔓 Urut soivat täydellisessä harmonisessa soinnussa! Sakastin salalokero oikealla takaseinällä halkeasi auki. Käy poimimassa sieltä Maria Koskelan lahjustodisteet!");
      }
    }

    function grabEvidence() {
      if (!state.isVaultOpen || state.hasEvidence) return;
      state.hasEvidence = true;
      playSpatialSound('mikael-key'); 
      document.getElementById('lopen-scroll').setAttribute('visible', 'false');
      document.getElementById('lopen-exit').setAttribute('color', '#10b981');
      document.getElementById('lopen-exit-text').setAttribute('value', 'AVATTU - PAENE TÄSTÄ');
      document.getElementById('lopen-exit-text').setAttribute('color', '#ffffff');
      updateHudMessage("🏆 Asiakirjat kerätty! Lahjustodisteet vuosilta 1951-1954 ovat nyt turvallisesti hallussasi. Klikkaa huoneen vasemmassa laidassa olevaa isoa puuovea paetaksesi seikkailusta voittoon!");
    }

    function triggerFinalEscape() {
      if (state.hasEvidence) {
        playSpatialSound('lopen-exit');
        document.getElementById('win-overlay').style.display = 'flex';
      } else {
        playSpatialSound('pikkupassi-train');
        updateHudMessage("⚠️ Tämän oven sähkösalvat avautuvat vasta, kun olet soittanut urkuarvoituksen ja kerännyt salalokeron asiakirjat haltuusi!");
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.addEventListener('click', () => {
        const scene = document.querySelector('a-scene');
        if (scene && scene.audioListener && scene.audioListener.context.state === 'suspended') {
          scene.audioListener.context.resume();
        }
      });

      // Sektori 1 kuuntelijat
      const key3d = document.getElementById('organ-key-mesh'); if (key3d) key3d.addEventListener('click', grabOrganKey);
      const gate3d = document.getElementById('lopen-gate'); if (gate3d) gate3d.addEventListener('click', triggerGateTransition);
      
      const buttons = ['1', '9', '0', '7', 'C', 'E'];
      buttons.forEach(b => {
        const btn = document.getElementById(`btn-p-${b}`);
        if (btn) btn.addEventListener('click', () => pressLocoKey(b));
      });

      // Sektori 2 kuuntelijat
      const portal3d = document.getElementById('church-portal-obj'); if (portal3d) portal3d.addEventListener('click', triggerChurchPortal);

      // Sektori 3 kuuntelijat
      const notes = ['D', 'A', 'F', 'G'];
      notes.forEach(n => {
        const k = document.getElementById(`lopen-${n}`);
        if (k) k.addEventListener('click', () => pressOrganKey(n));
      });
      
      const ev3d = document.getElementById('lopen-scroll'); if (ev3d) ev3d.addEventListener('click', grabEvidence);
      const exit3d = document.getElementById('lopen-exit'); if (exit3d) exit3d.addEventListener('click', triggerFinalEscape);
    });
  </script>
</body>
</html>
